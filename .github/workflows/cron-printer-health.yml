name: Cron — Printer Health

# Pinga /api/cron/printer-health ogni 5 min per:
#  - recovery orphan print_jobs (stampante crashata mid-print)
#  - aggiornare counters (pending_count, oldest_age) per banner dashboard
#  - rilevare se la stampante è offline (no poll da >5 min e non sta stampando)
#
# Sostituisce il cron Vercel (limitato a 2/giorno su piano Hobby).
# GitHub Actions free: 2000 min/mese, ogni run dura ~3s → ~432 min/mese. Sicuro.
# Schedule cron in UTC.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # permette trigger manuale dalla UI GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping printer-health endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron/1.0" \
            --max-time 30 \
            https://special-sushi-poke.vercel.app/api/cron/printer-health)
          body=$(echo "$response" | head -n -1)
          http_code=$(echo "$response" | tail -n 1)
          echo "Response: $body"
          echo "HTTP: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::printer-health returned HTTP $http_code"
            exit 1
          fi
